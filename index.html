<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ISSN 2026 Planner</title>
<style>
  :root {
    --bg: #f7f8fa;
    --card: #ffffff;
    --ink: #1a2332;
    --muted: #5b6478;
    --accent: #1f4e78;
    --accent-soft: #d9e1f2;
    --gold: #f4c430;
    --gold-soft: #fff2cc;
    --gold-ink: #7c5b00;
    --warn: #c0392b;
    --warn-soft: #fdecea;
    --border: #e3e7ee;
    --break: #ededed;
    --break-ink: #595959;
  }
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
    background: var(--bg);
    color: var(--ink);
    margin: 0;
    line-height: 1.5;
  }
  header {
    background: var(--accent);
    color: white;
    padding: 24px 20px;
    text-align: center;
  }
  header h1 { margin: 0 0 4px; font-size: 1.6rem; }
  header p { margin: 0; opacity: 0.85; font-size: 0.95rem; }
  .container { max-width: 1100px; margin: 0 auto; padding: 20px; }
  .controls {
    background: var(--card);
    padding: 16px;
    border-radius: 10px;
    border: 1px solid var(--border);
    margin-bottom: 20px;
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    align-items: center;
  }
  .controls input[type="text"] {
    flex: 1;
    min-width: 200px;
    padding: 10px 12px;
    border: 1px solid var(--border);
    border-radius: 8px;
    font-size: 0.95rem;
    font-family: inherit;
  }
  .day-tabs { display: flex; gap: 6px; flex-wrap: wrap; }
  .day-tab {
    padding: 8px 14px;
    background: white;
    border: 1px solid var(--border);
    border-radius: 8px;
    cursor: pointer;
    font-size: 0.9rem;
    font-family: inherit;
    color: var(--ink);
  }
  .day-tab.active {
    background: var(--accent);
    color: white;
    border-color: var(--accent);
  }
  .toggle-starred {
    padding: 8px 14px;
    background: white;
    border: 1px solid var(--border);
    border-radius: 8px;
    cursor: pointer;
    font-size: 0.9rem;
    font-family: inherit;
  }
  .toggle-starred.active {
    background: var(--gold);
    border-color: var(--gold);
  }
  .day-header {
    margin: 24px 0 12px;
    padding-bottom: 6px;
    border-bottom: 2px solid var(--accent-soft);
    color: var(--accent);
    font-size: 1.2rem;
  }
  .session {
    background: var(--card);
    border: 1px solid var(--border);
    border-left: 4px solid var(--accent-soft);
    border-radius: 10px;
    padding: 14px 16px;
    margin-bottom: 10px;
    display: grid;
    grid-template-columns: 110px 1fr auto;
    gap: 14px;
    align-items: start;
  }
  .session.break {
    background: var(--break);
    border-left-color: #bbb;
    color: var(--break-ink);
    font-style: italic;
  }
  .session.yours {
    background: var(--gold-soft);
    border-left-color: var(--gold);
    border: 2px solid var(--gold);
  }
  .session.conflict {
    border-left-color: var(--warn);
  }
  .time { font-weight: 600; color: var(--muted); font-size: 0.85rem; }
  .session.yours .time { color: var(--gold-ink); }
  .session-num { display: block; font-size: 0.75rem; opacity: 0.7; margin-top: 2px; }
  .body .title { font-weight: 600; margin-bottom: 4px; }
  .session.yours .body .title { color: var(--gold-ink); }
  .meta { font-size: 0.85rem; color: var(--muted); margin-bottom: 6px; }
  .meta strong { color: var(--ink); font-weight: 500; }
  .speakers { font-size: 0.9rem; }
  .speaker-link {
    color: var(--accent);
    cursor: pointer;
    text-decoration: underline dotted;
  }
  .speaker-link:hover { color: var(--ink); }
  .description {
    font-size: 0.88rem;
    color: var(--muted);
    margin-top: 8px;
    padding-top: 8px;
    border-top: 1px dashed var(--border);
    display: none;
  }
  .session.expanded .description { display: block; }
  .badges { margin-top: 6px; }
  .badge {
    display: inline-block;
    background: var(--accent-soft);
    color: var(--accent);
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 0.75rem;
    margin-right: 4px;
  }
  .badge.warn { background: var(--warn-soft); color: var(--warn); font-weight: 600; }
  .star {
    background: none;
    border: none;
    font-size: 1.5rem;
    cursor: pointer;
    color: #ccc;
    padding: 0;
    line-height: 1;
  }
  .star.active { color: var(--gold); }
  .expand-btn {
    background: none;
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 4px 10px;
    font-size: 0.8rem;
    cursor: pointer;
    color: var(--muted);
    margin-top: 6px;
    font-family: inherit;
  }
  /* Modal for speaker bios */
  .modal-bg {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.5);
    display: none;
    align-items: center;
    justify-content: center;
    padding: 20px;
    z-index: 100;
  }
  .modal-bg.open { display: flex; }
  .modal {
    background: white;
    border-radius: 12px;
    max-width: 520px;
    width: 100%;
    padding: 24px;
    max-height: 85vh;
    overflow-y: auto;
  }
  .modal h3 { margin-top: 0; color: var(--accent); }
  .modal .close {
    float: right;
    background: none;
    border: none;
    font-size: 1.4rem;
    cursor: pointer;
    color: var(--muted);
  }
  .schedule-hint {
    flex: 1 1 100%;
    margin: 0;
    font-size: 0.85rem;
    color: var(--muted);
  }
  .live-banner {
    background: var(--accent);
    color: #fff;
    max-height: 50px;
    overflow: hidden;
  }
  .live-banner[hidden] { display: none; }
  .live-banner-inner {
    max-width: 1100px;
    margin: 0 auto;
    padding: 8px 16px;
    display: flex;
    align-items: center;
    gap: 8px;
    min-height: 36px;
    font-size: 0.88rem;
    line-height: 1.3;
  }
  .live-pulse {
    flex-shrink: 0;
    font-size: 1.1rem;
    line-height: 1;
    opacity: 0.95;
  }
  .live-banner.live .live-pulse {
    animation: bannerPulse 1.4s ease-in-out infinite;
  }
  .live-banner-text {
    flex: 1;
    min-width: 0;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .live-jump-btn {
    flex-shrink: 0;
    padding: 4px 10px;
    background: rgba(255, 255, 255, 0.15);
    border: 1px solid rgba(255, 255, 255, 0.55);
    border-radius: 6px;
    color: #fff;
    font-size: 0.8rem;
    font-family: inherit;
    cursor: pointer;
    white-space: nowrap;
  }
  .live-jump-btn:hover { background: rgba(255, 255, 255, 0.28); }
  @keyframes bannerPulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.35; transform: scale(0.85); }
  }
  .session.live-now {
    border-left: 4px solid var(--accent) !important;
    animation: liveCardPulse 2s ease-in-out infinite;
  }
  .session.yours.live-now {
    border-left: 4px solid var(--accent) !important;
  }
  @keyframes liveCardPulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(31, 78, 120, 0.18); }
    50% { box-shadow: 0 0 0 5px rgba(31, 78, 120, 0.08); }
  }
  @media (max-width: 640px) {
    .live-banner { max-height: none; }
    .live-banner-inner {
      flex-wrap: wrap;
      padding: 8px 12px;
      font-size: 0.82rem;
    }
    .live-banner-text {
      white-space: normal;
      flex: 1 1 100%;
    }
    .live-jump-btn { margin-left: 18px; }
    .session { grid-template-columns: 1fr; }
    .star { justify-self: end; }
    .time { font-size: 0.95rem; }
  }
</style>
</head>
<body>
<header>
  <h1>ISSN 2026 — Fort Lauderdale</h1>
  <p>The Westin Fort Lauderdale Beach Resort • June 17–19, 2026</p>
</header>
<div id="liveBanner" class="live-banner" hidden>
  <div class="live-banner-inner">
    <span class="live-pulse" aria-hidden="true">•</span>
    <span id="liveBannerText" class="live-banner-text"></span>
    <button type="button" id="liveJumpBtn" class="live-jump-btn" hidden>Jump to session</button>
  </div>
</div>
<div class="container">
  <div class="controls">
    <input type="text" id="search" placeholder="Search title, speaker, topic…">
    <div class="day-tabs">
      <button class="day-tab active" data-day="all">All</button>
      <button class="day-tab" data-day="Wednesday">Wed</button>
      <button class="day-tab" data-day="Thursday">Thu</button>
      <button class="day-tab" data-day="Friday">Fri</button>
    </div>
    <button class="toggle-starred" id="starredOnly">★ Starred only</button>
    <button class="toggle-starred" id="printSchedule" type="button">Print My Schedule</button>
    <button class="toggle-starred" id="exportCalendar" type="button">Export to Calendar (.ics)</button>
    <p class="schedule-hint" id="scheduleHint" hidden>Print and calendar export will include your poster only until you star other sessions.</p>
  </div>
  <div id="sessions"></div>
</div>
<div class="modal-bg" id="modalBg">
  <div class="modal">
    <button class="close" onclick="closeModal()">×</button>
    <h3 id="modalName"></h3>
    <p id="modalBio"></p>
  </div>
</div>

// ===== LIVE NOW =====
const ET_TZ = "America/New_York";
const CONFERENCE_START_KEY = 20260617;
const ET_DATE_TO_DAY = {
  "2026-6-17": "Wednesday",
  "2026-6-18": "Thursday",
  "2026-6-19": "Friday"
};
const CONFERENCE_DAY_ORDER = ["Wednesday", "Thursday", "Friday"];
const ICS_MONTHS = { June: 6 };

let liveSessionKey = null;
let bannerTimer = null;

function getEtParts(date = new Date()) {
  const parts = {};
  new Intl.DateTimeFormat("en-US", {
    timeZone: ET_TZ,
    year: "numeric",
    month: "numeric",
    day: "numeric",
    hour: "2-digit",
    minute: "2-digit",
    second: "2-digit",
    hour12: false
  }).formatToParts(date).forEach(p => {
    if (p.type !== "literal") parts[p.type] = parseInt(p.value, 10);
  });
  return parts;
}

function etDateKey(parts) {
  return parts.year * 10000 + parts.month * 100 + parts.day;
}

function makeEtDate(year, month, day, hour, minute) {
  return new Date(`${year}-${String(month).padStart(2, "0")}-${String(day).padStart(2, "0")}T${String(hour).padStart(2, "0")}:${String(minute).padStart(2, "0")}:00-04:00`);
}

function liveParseMeridiem(part) {
  const match = part.match(/\b(AM|PM)\b/i);
  return match ? match[1].toUpperCase() : null;
}

function liveParseClock(part, meridiem) {
  const cleaned = part.replace(/\s*(AM|PM)\s*/gi, "").trim();
  const match = cleaned.match(/^(\d{1,2}):(\d{2})$/);
  if (!match || !meridiem) return null;
  let hour = parseInt(match[1], 10);
  const minute = parseInt(match[2], 10);
  if (meridiem === "PM" && hour !== 12) hour += 12;
  if (meridiem === "AM" && hour === 12) hour = 0;
  return { hour, minute };
}

function parseSessionTime(session) {
  const [monthName, dayStr] = session.date.split(" ");
  const month = ICS_MONTHS[monthName];
  const day = parseInt(dayStr, 10);
  if (!month || !day) return null;

  const normalized = session.time.replace(/\u2013/g, "-").trim();
  const parts = normalized.includes("-")
    ? normalized.split("-").map(p => p.trim())
    : [normalized.trim()];

  const endMer = parts.length > 1 ? (liveParseMeridiem(parts[1]) || liveParseMeridiem(parts[0])) : liveParseMeridiem(parts[0]);
  const startMer = liveParseMeridiem(parts[0]) || endMer;
  const start = liveParseClock(parts[0], startMer);
  if (!start) return null;

  let end;
  if (parts.length > 1) {
    end = liveParseClock(parts[1], liveParseMeridiem(parts[1]) || startMer);
  }
  if (!end) {
    let duration = 30;
    if (session.num === "Welcome") duration = 10;
    else if (session.num === "Closing") duration = 30;
    end = { hour: start.hour, minute: start.minute + duration };
    while (end.minute >= 60) { end.hour += 1; end.minute -= 60; }
  }

  return {
    startDate: makeEtDate(2026, month, day, start.hour, start.minute),
    endDate: makeEtDate(2026, month, day, end.hour, end.minute)
  };
}

function buildSessionSchedule() {
  const schedule = [];
  for (const session of SESSIONS) {
    const range = parseSessionTime(session);
    if (!range) return [];
    schedule.push({
      session,
      key: session.day + "_" + session.num + "_" + session.title.slice(0, 20),
      ...range
    });
  }
  return schedule.sort((a, b) => a.startDate - b.startDate);
}

const SESSION_SCHEDULE = buildSessionSchedule();

function formatCountdown(ms) {
  if (ms <= 0) return "0 days, 0 hours";
  const totalHours = Math.floor(ms / 3600000);
  const days = Math.floor(totalHours / 24);
  const hours = totalHours % 24;
  return `${days} day${days === 1 ? "" : "s"}, ${hours} hour${hours === 1 ? "" : "s"}`;
}

function formatEtTime(date) {
  return new Intl.DateTimeFormat("en-US", {
    timeZone: ET_TZ,
    hour: "numeric",
    minute: "2-digit",
    hour12: true
  }).format(date);
}

function findLiveSession(now) {
  return SESSION_SCHEDULE.find(item => now >= item.startDate && now < item.endDate) || null;
}

function findNextSession(now) {
  return SESSION_SCHEDULE.find(item => item.startDate > now) || null;
}

function lastSessionOfDay(dayName) {
  const dayItems = SESSION_SCHEDULE.filter(item => item.session.day === dayName);
  return dayItems.length ? dayItems[dayItems.length - 1] : null;
}

function setLiveSessionKey(k) {
  if (liveSessionKey === k) return;
  liveSessionKey = k;
  render();
}

function scheduleBannerUpdate(intervalMs) {
  clearInterval(bannerTimer);
  bannerTimer = setInterval(updateLiveBanner, intervalMs);
}

function updateLiveBanner() {
  const banner = document.getElementById("liveBanner");
  const textEl = document.getElementById("liveBannerText");
  const jumpBtn = document.getElementById("liveJumpBtn");
  if (!banner || !SESSION_SCHEDULE.length) {
    if (banner) banner.hidden = true;
    return;
  }

  const now = new Date();
  const et = getEtParts(now);
  const dateKey = etDateKey(et);
  const conferenceStart = SESSION_SCHEDULE[0].startDate;
  const conferenceEnd = SESSION_SCHEDULE[SESSION_SCHEDULE.length - 1].endDate;

  banner.classList.remove("live", "countdown", "between", "ended");
  jumpBtn.hidden = true;

  if (now >= conferenceEnd) {
    banner.hidden = false;
    banner.classList.add("ended");
    textEl.textContent = "ISSN 2026 has ended. See you in Jupiter, FL — June 14–16, 2027.";
    setLiveSessionKey(null);
    clearInterval(bannerTimer);
    bannerTimer = null;
    return;
  }

  if (dateKey < CONFERENCE_START_KEY) {
    banner.hidden = false;
    banner.classList.add("countdown");
    textEl.textContent = `ISSN 2026 starts in ${formatCountdown(conferenceStart - now)}`;
    setLiveSessionKey(null);
    scheduleBannerUpdate(60000);
    return;
  }

  const live = findLiveSession(now);
  if (live) {
    banner.hidden = false;
    banner.classList.add("live");
    const s = live.session;
    const speakers = s.speakers.length ? s.speakers.join(", ") : "";
    const bits = [`LIVE NOW: ${s.num} — ${s.title}`];
    if (speakers) bits.push(speakers);
    if (s.room) bits.push(s.room);
    textEl.textContent = bits.join(" · ");
    jumpBtn.hidden = false;
    setLiveSessionKey(live.key);
    scheduleBannerUpdate(30000);
    return;
  }

  setLiveSessionKey(null);
  banner.hidden = false;
  banner.classList.add("between");

  const dayName = ET_DATE_TO_DAY[`${et.year}-${et.month}-${et.day}`];
  const next = findNextSession(now);

  if (!next) {
    banner.hidden = true;
    scheduleBannerUpdate(60000);
    return;
  }

  if (dayName) {
    const last = lastSessionOfDay(dayName);
    if (last && now >= last.endDate && dayName !== "Friday") {
      textEl.textContent = `Conference resumes tomorrow at ${formatEtTime(next.startDate)}`;
      scheduleBannerUpdate(60000);
      return;
    }
  }

  const mins = Math.max(1, Math.round((next.startDate - now) / 60000));
  textEl.textContent = `Next up: ${next.session.num} — ${next.session.title} in ${mins} min`;
  scheduleBannerUpdate(60000);
}

function jumpToLiveSession() {
  const el = document.getElementById("live-session");
  if (el) el.scrollIntoView({ behavior: "smooth", block: "center" });
}

      }
      return true;

    const h = document.createElement("h2");

function renderSession(s) {
  const k = key(s);
  const isStarred = starred.includes(k);
  const isExpanded = expanded.has(k);

  const div = document.createElement("div");
  div.className = "session";

  if (s.type === "yours") div.classList.add("yours");

  const speakersHtml = s.speakers.map(name =>
    BIOS[name] ? `<span class="speaker-link" onclick="showBio('${name.replace(/'/g,"\\'")}')">${name}</span>` : name
  ).join(", ");

  div.innerHTML = `
    <div>
      <div class="time">${s.time}</div>
      <span class="session-num">${s.num}</span>
    </div>
    <div class="body">
      <div class="title">${s.title}</div>

    </div>
    <button class="star ${isStarred ? 'active' : ''}" onclick="toggleStar('${k.replace(/'/g,"\\'")}')" title="${isStarred ? 'Unstar' : 'Star'}">★</button>
  `;
  return div;

function toggleStar(k) {

function sessionStartMinutes(s) {
  const times = parseSessionTimes(s);
  if (!times) return 0;
  const m = times.start.match(/T(\d{2})(\d{2})/);
  return m ? parseInt(m[1], 10) * 60 + parseInt(m[2], 10) : 0;
}

function escapeHtml(text) {
  return String(text || "")
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;");
}

const SCHEDULE_DAYS = ["Wednesday", "Thursday", "Friday"];

function pad(n) { return String(n).padStart(2, "0"); }

function icsEscape(text) {
  return String(text || "")
    .replace(/\\/g, "\\\\")
    .replace(/;/g, "\\;")
    .replace(/,/g, "\\,")
    .replace(/\n/g, "\\n");
}

function foldIcsLine(line) {
  if (line.length <= 75) return line;
  const parts = [line.slice(0, 75)];
  let rest = line.slice(75);
  while (rest.length > 74) {
    parts.push(" " + rest.slice(0, 74));
    rest = rest.slice(74);
  }
  if (rest) parts.push(" " + rest);
  return parts.join("\r\n");
}

function parseMeridiem(part) {
  const match = part.match(/\b(AM|PM)\b/i);
  return match ? match[1].toUpperCase() : null;
}

function parseClock(part, meridiem) {
  const cleaned = part.replace(/\s*(AM|PM)\s*/gi, "").trim();
  const match = cleaned.match(/^(\d{1,2}):(\d{2})$/);
  if (!match || !meridiem) return null;
  let hour = parseInt(match[1], 10);
  const minute = parseInt(match[2], 10);
  if (meridiem === "PM" && hour !== 12) hour += 12;
  if (meridiem === "AM" && hour === 12) hour = 0;
  return { hour, minute };
}

function parseSessionTimes(s) {
  const [monthName, dayStr] = s.date.split(" ");
  const month = ICS_MONTHS[monthName];
  const day = parseInt(dayStr, 10);
  if (!month || !day) return null;

  const normalized = s.time.replace(/\u2013/g, "-").trim();
  const parts = normalized.includes("-")
    ? normalized.split("-").map(p => p.trim())
    : [normalized.trim()];

  const endMer = parts.length > 1 ? (parseMeridiem(parts[1]) || parseMeridiem(parts[0])) : parseMeridiem(parts[0]);
  const startMer = parseMeridiem(parts[0]) || endMer;
  const start = parseClock(parts[0], startMer);
  if (!start) return null;

  let end;
  if (parts.length > 1) {
    end = parseClock(parts[1], parseMeridiem(parts[1]) || startMer);
  }
  if (!end) {
    end = { hour: start.hour, minute: start.minute + 30 };
    if (end.minute >= 60) { end.hour += 1; end.minute -= 60; }
  }

  const fmt = (h, m) => `2026${pad(month)}${pad(day)}T${pad(h)}${pad(m)}00`;
  return {
    start: fmt(start.hour, start.minute),
    end: fmt(end.hour, end.minute)
  };
}

function icsDescription(s) {
  const speakers = s.speakers.join(", ");
  if (speakers && s.desc) return speakers + "\n\n" + s.desc;
  return speakers || s.desc || "";
}

function buildIcsEvent(s) {
  const times = parseSessionTimes(s);
  if (!times) return null;
  return [
    "BEGIN:VEVENT",
    foldIcsLine(`UID:${icsEscape(key(s))}`),
    foldIcsLine(`DTSTAMP:${new Date().toISOString().replace(/[-:]/g, "").replace(/\.\d{3}Z$/, "Z")}`),
    foldIcsLine(`DTSTART;TZID=America/New_York:${times.start}`),
    foldIcsLine(`DTEND;TZID=America/New_York:${times.end}`),
    foldIcsLine(`SUMMARY:${icsEscape(s.title)}`),
    foldIcsLine(`LOCATION:${icsEscape(s.room || "")}`),
    foldIcsLine(`DESCRIPTION:${icsEscape(icsDescription(s))}`),
    "END:VEVENT"
  ].join("\r\n");
}

function buildIcs(sessions) {
  const events = sessions.map(buildIcsEvent).filter(Boolean);
  const header = [
    "BEGIN:VCALENDAR",
    "VERSION:2.0",
    "PRODID:-//ISSN 2026 Planner//EN",
    "BEGIN:VTIMEZONE",
    "TZID:America/New_York",
    "X-LIC-LOCATION:America/New_York",
    "BEGIN:DAYLIGHT",
    "TZOFFSETFROM:-0500",
    "TZOFFSETTO:-0400",
    "TZNAME:EDT",
    "DTSTART:19700308T020000",
    "RRULE:FREQ=YEARLY;BYMONTH=3;BYDAY=2SU",
    "END:DAYLIGHT",
    "BEGIN:STANDARD",
    "TZOFFSETFROM:-0400",
    "TZOFFSETTO:-0500",
    "TZNAME:EST",
    "DTSTART:19701101T020000",
    "RRULE:FREQ=YEARLY;BYMONTH=11;BYDAY=1SU",
    "END:STANDARD",
    "END:VTIMEZONE"
  ].join("\r\n");
  return header + "\r\n" + events.join("\r\n") + "\r\nEND:VCALENDAR\r\n";
}

<style>

function exportToCalendar() {
  const sessions = myScheduleSessions();
  const ics = buildIcs(sessions);
  const blob = new Blob([ics], { type: "text/calendar;charset=utf-8" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = "issn-2026-schedule.ics";
  document.body.appendChild(a);
  a.click();
  a.remove();
  URL.revokeObjectURL(url);
}

function printMySchedule() {
  const sessions = myScheduleSessions();
  const printWindow = window.open("", "_blank");
  if (!printWindow) {
    alert("Pop-up blocked. Allow pop-ups for this page to print your schedule.");
    return;
  }
  printWindow.document.open();
  printWindow.document.write(buildPrintDocument(sessions));
  printWindow.document.close();
  printWindow.focus();
  setTimeout(() => printWindow.print(), 300);
}
document.getElementById("modalBg").addEventListener("click", e => {
  if (e.target.id === "modalBg") closeModal();
});

document.querySelectorAll(".day-tab").forEach(t => {
  t.addEventListener("click", () => {
    document.querySelectorAll(".day-tab").forEach(x => x.classList.remove("active"));
    t.classList.add("active");
    activeDay = t.dataset.day;
    render();
  });
});
document.getElementById("starredOnly").addEventListener("click", e => {
  starredOnly = !starredOnly;
  e.target.classList.toggle("active", starredOnly);
  e.target.textContent = starredOnly ? "★ Showing starred" : "★ Starred only";
  render();
});
document.getElementById("search").addEventListener("input", e => {
  searchTerm = e.target.value;
  render();
});
document.getElementById("printSchedule").addEventListener("click", printMySchedule);
document.getElementById("exportCalendar").addEventListener("click", exportToCalendar);
document.getElementById("liveJumpBtn").addEventListener("click", jumpToLiveSession);

updateScheduleHint();
updateLiveBanner();
render();
